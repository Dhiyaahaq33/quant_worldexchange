<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BINANCE INTELLIGENCE | CORE ACCESS</title>
    <style>
        body { 
            background-color: #050505; 
            color: #00ff41; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding: 30px;
            overflow-x: hidden;
        }
        .dashboard-header h1 {
            font-size: 3em;
            text-shadow: 0 0 20px #00ff41;
            margin-bottom: 5px;
            letter-spacing: 2px;
            color: #00ff41;
        }

        /* --- ANIMASI LAMPU NEON UNTUK GRADE A+ --- */
        @keyframes neonPulseGreen {
            0% { box-shadow: 0 0 5px #00ff41; border-color: #00ff41; }
            50% { box-shadow: 0 0 25px #00ff41; border-color: #00ff41; }
            100% { box-shadow: 0 0 5px #00ff41; border-color: #00ff41; }
        }

        @keyframes neonPulseRed {
            0% { box-shadow: 0 0 5px #ff3e3e; border-color: #ff3e3e; }
            50% { box-shadow: 0 0 25px #ff3e3e; border-color: #ff3e3e; }
            100% { box-shadow: 0 0 5px #ff3e3e; border-color: #ff3e3e; }
        }

        .highlight-a-plus-buy {
            animation: neonPulseGreen 1.5s infinite ease-in-out !important;
            border: 2px solid #00ff41 !important;
        }

        .highlight-a-plus-sell {
            animation: neonPulseRed 1.5s infinite ease-in-out !important;
            border: 2px solid #ff3e3e !important;
        }

        /* --- STYLING KARTU --- */
        .signal-card {
            border: 1px solid #222;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            background: rgba(15, 15, 15, 0.9);
        }

        .card-buy { border-left: 10px solid #00ff41; }
        .card-sell { border-left: 10px solid #ff3e3e; }
        .card-wait { border-left: 10px solid #f1c40f; }

        .asset-name { font-size: 2.2em; font-weight: 900; color: #ffffff; letter-spacing: 1px; }
        .signal-text { font-size: 1.6em; font-weight: bold; text-transform: uppercase; }
        
        .buy { color: #00ff41; text-shadow: 0 0 10px #00ff41; }
        .sell { color: #ff3e3e; text-shadow: 0 0 10px #ff3e3e; }
        .neutral { color: #f1c40f; text-shadow: 0 0 10px #f1c40f; }

        .grade-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-left: 10px;
            border: 1px solid currentColor;
            background: rgba(0,0,0,0.5);
        }

        .indicator-label { color: #777; font-size: 0.75em; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .indicator-val { color: #fff; font-size: 1.3em; font-weight: bold; }
        
        .new-signal-anim { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <div class="dashboard-header">
        <h1>BINANCE INTELLIGENCE</h1>
        <p id="status" style="color: #555;">ESTABLISHING CORE ACCESS...</p>
    </div>
    <hr style="border: 0; border-top: 1px solid #333; margin-bottom: 30px;">

    <div id="feed-container"></div>

    <script>
        let lastAssetsCount = 0;

        async function updateDashboard() {
            try {
                const response = await fetch('/api/intelligence');
                const data = await response.json();
                const container = document.getElementById('feed-container');
                
                document.getElementById('status').innerText = `LIVE CORE ACTIVE | ${new Date().toLocaleTimeString()} | ENCRYPTED`;

                // Play sound if new signal detected
                if (data.reports.length > lastAssetsCount) {
                    if (lastAssetsCount !== 0) document.getElementById('alert-sound').play().catch(() => {});
                    lastAssetsCount = data.reports.length;
                }

                const existingCards = Array.from(container.children).map(c => c.getAttribute('data-asset'));
                container.innerHTML = ''; 
                
                data.reports.forEach(report => {
                    let colorClass = 'neutral';
                    let barClass = 'card-wait';
                    let highlightClass = '';

                    // Logic for Colors & Neon Pulse
                    if (report.signal.includes('ACCUMULATION')) { 
                        colorClass = 'buy'; 
                        barClass = 'card-buy';
                        if (report.grade.includes('A+')) highlightClass = 'highlight-a-plus-buy';
                    } 
                    else if (report.signal.includes('DISTRIBUTION')) { 
                        colorClass = 'sell'; 
                        barClass = 'card-sell';
                        if (report.grade.includes('A+')) highlightClass = 'highlight-a-plus-sell';
                    }
                    
                    const gradeColor = report.grade.includes('A+') ? '#00ff41' : (report.grade.includes('B') ? '#f1c40f' : '#888');
                    const animationClass = existingCards.includes(report.asset) ? '' : 'new-signal-anim';

                    const card = document.createElement('div');
                    card.className = `signal-card ${barClass} ${highlightClass} ${animationClass}`;
                    card.setAttribute('data-asset', report.asset);
                    
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                            <div>
                                <span class="asset-name">${report.asset}</span>
                                <span class="grade-badge" style="color: ${gradeColor}">${report.grade}</span>
                                <div style="color: #444; font-size: 0.75em; margin-top: 8px; font-family: monospace;">TIME: ${report.time} | STATUS: VERIFIED</div>
                            </div>
                            <span class="signal-text ${colorClass}">${report.signal}</span>
                        </div>                        
                        
                        <div style="display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr 0.8fr; gap: 20px; margin-bottom: 25px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; border: 1px solid #222;">
                            <div><div class="indicator-label">ENTRY PRICE</div><div class="indicator-val">$${report.price}</div></div>
                            <div><div class="indicator-label">RSI (14)</div><div class="indicator-val" style="color: #fff">${report.rsi}</div></div>
                            <div><div class="indicator-label">B-POWER</div><div class="indicator-val" style="color: #00ff41">${report.mpi}%</div></div>
                            <div><div class="indicator-label">VOL SPIKE</div><div class="indicator-val" style="color: #f1c40f">${report.vol}x</div></div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; border-top: 1px dashed #333; padding-top: 20px;">
                            <div><div class="indicator-label">INTRINSIC TP 1</div><div class="indicator-val" style="color:#00ff41">$${report.tp1}</div></div>
                            <div><div class="indicator-label">INTRINSIC TP 2</div><div class="indicator-val" style="color:#00ff41">$${report.tp2}</div></div>
                            <div><div class="indicator-label">INTRINSIC TP 3</div><div class="indicator-val" style="color:#00ff41">$${report.tp3}</div></div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) { 
                document.getElementById('status').innerText = "CORE CONNECTION ERROR. RETRYING...";
            }
        }
        
        setInterval(updateDashboard, 2500); 
        updateDashboard();
    </script>
</body>
</html>
